<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>雲端檔案管理系統</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css">
  <style>
    body { background-color: #f4f7f6; padding-top: 50px; font-family: "PingFang TC", "Heiti TC", "Microsoft JhengHei", sans-serif; }
    .main-card { max-width: 550px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.08); }
    #uploadSection { display: none; }
    .loading-spinner { display: none; }
    .file-hint { font-size: 0.8rem; color: #888; margin-top: 4px; }
  </style>
</head>
<body>

<div class="container">
  <div class="main-card">
    <h3 class="text-center mb-4">雲端硬碟儲存系統</h3>

    <!-- 驗證區塊 -->
    <div id="loginSection">
      <div class="mb-3">
        <label class="form-label">管理員驗證碼</label>
        <input type="password" id="vCode" class="form-control" placeholder="請輸入密碼">
      </div>
      <button class="btn btn-primary w-100" onclick="login()">登入</button>
    </div>

    <!-- 上傳區塊 -->
    <div id="uploadSection">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <span class="text-success">● 系統已就緒</span>
        <button class="btn btn-sm btn-outline-danger" onclick="logout()">登出</button>
      </div>
      <hr>

      <div class="mb-3">
        <label class="form-label">指定資料夾名稱</label>
        <input type="text" id="folderName" class="form-control" placeholder="#上傳資料">
        <small class="text-muted">若同名檔案已存在，系統將自動覆蓋舊檔</small>
      </div>

      <div class="mb-3">
        <label class="form-label">選擇檔案</label>
        <input type="file" id="fileInput" class="form-control" 
               accept=".jpg,.jpeg,.gif,.png,.svg,.tiff,.webp,.doc,.docx,.pdf,.xls,.xlsx,.ppt,.pptx">
        <div class="file-hint">支援格式：圖片、Word、Excel、PPT、PDF</div>
      </div>

      <button class="btn btn-success w-100" id="uploadBtn" onclick="handleUpload()">上傳並覆蓋舊檔</button>

      <!-- 讀取動畫 -->
      <div class="loading-spinner text-center mt-3" id="loader">
        <div class="spinner-border text-primary" role="status"></div>
        <p class="mt-2 text-primary">檔案處理中，請稍候...</p>
      </div>

      <!-- 結果提示 -->
      <div id="result" class="mt-3"></div>
    </div>
  </div>
</div>

<script>
  /**
   * 重要：請在此處更換為您的 GAS 部署網址
   */
  const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxEJsbs608_LJZwNN5FbRpxL8QDrZsO31R-SV3dpq5LV2jmvYUSBqghH32ljaPNnai7/exec"; 

  // 1. 登入
  function login() {
    const code = document.getElementById('vCode').value;
    if(!code) return alert("請輸入驗證碼");

    sendRequest({ action: 'verify', code: code }, function(res) {
      if (res.success) {
        document.getElementById('loginSection').style.display = 'none';
        document.getElementById('uploadSection').style.display = 'block';
      } else {
        alert(res.message);
      }
    });
  }

  // 2. 上傳
  function handleUpload() {
    const fileInput = document.getElementById('fileInput');
    const folderName = document.getElementById('folderName').value;
    const resultDiv = document.getElementById('result');
    const loader = document.getElementById('loader');
    const uploadBtn = document.getElementById('uploadBtn');

    if (fileInput.files.length === 0) return alert("請先選取檔案");

    const file = fileInput.files[0];
    const reader = new FileReader();

    loader.style.display = 'block';
    uploadBtn.disabled = true;
    resultDiv.innerHTML = "";

    reader.onload = function(e) {
      const payload = {
        action: 'upload',
        data: e.target.result,
        fileName: file.name,
        mimeType: file.type,
        folderName: folderName
      };

      sendRequest(payload, function(res) {
        loader.style.display = 'none';
        uploadBtn.disabled = false;

        if (res.success) {
          resultDiv.innerHTML = `
            <div class="alert alert-success">
              <strong>上傳成功！</strong><br>
              位置：${res.folderUsed}<br>
              連結：<a href="${res.url}" target="_blank">點此查看檔案</a><br>
              <small>${res.note}</small>
            </div>`;
          fileInput.value = ""; 
        } else {
          resultDiv.innerHTML = `<div class="alert alert-danger">失敗：${res.message}</div>`;
        }
      });
    };
    reader.readAsDataURL(file);
  }

  // 3. 請求工具
  function sendRequest(data, callback) {
    fetch(GAS_WEB_APP_URL, {
      method: "POST",
      body: JSON.stringify(data)
    })
    .then(res => res.json())
    .then(callback)
    .catch(err => {
      console.error(err);
      alert("連線至 Google 伺服器失敗，請檢查部署網址與權限設定。");
      document.getElementById('loader').style.display = 'none';
      document.getElementById('uploadBtn').disabled = false;
    });
  }

  // 4. 登出
  function logout() {
    location.reload();
  }
</script>
</body>
</html>
